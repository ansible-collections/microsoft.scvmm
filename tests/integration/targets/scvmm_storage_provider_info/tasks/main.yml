---
- name: Define test variables
  set_fact:
    test_provider_name: "AnsibleTest_ProviderInfo_{{ 99999 | random }}"

- block:
    - name: Setup - Create test storage provider
      microsoft.scvmm.scvmm_storage_provider:
        name: "{{ test_provider_name }}"
        computer_name: "{{ test_vm_host }}"
        run_as_account: "{{ test_run_as_account }}"
        state: present
        vmm_server: "{{ scvmm_server }}"

    - name: Run tests
      ansible.builtin.include_tasks: tests.yml

  always:
    - name: Teardown - Remove test storage provider
      microsoft.scvmm.scvmm_storage_provider:
        name: "{{ test_provider_name }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true

    - name: Teardown - Validate provider removed
      microsoft.scvmm.scvmm_storage_provider:
        name: "{{ test_provider_name }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      register: teardown_validate

    - name: Teardown - Assert server is clean
      assert:
        that:
          - teardown_validate.changed == false
