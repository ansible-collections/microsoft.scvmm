---
- name: Define test variables
  ansible.builtin.set_fact:
    test_port_class_name: "AnsibleTest_PortClass_{{ 99999 | random }}"

- block:
    - name: Run tests
      ansible.builtin.include_tasks: tests.yml

  always:
    - name: Teardown - Remove test port classification
      microsoft.scvmm.scvmm_port_classification:
        name: "{{ test_port_class_name }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true

    - name: Teardown - Validate port classification removed
      microsoft.scvmm.scvmm_port_classification_info:
        name: "{{ test_port_class_name }}"
        vmm_server: "{{ scvmm_server }}"
      register: teardown_validate

    - name: Teardown - Assert server is clean
      ansible.builtin.assert:
        that:
          - teardown_validate.port_classifications | length == 0
