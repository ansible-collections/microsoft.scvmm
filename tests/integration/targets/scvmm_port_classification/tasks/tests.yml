---
# ── Create port classification ──
- name: Create port classification
  microsoft.scvmm.scvmm_port_classification:
    name: "{{ test_port_class_name }}"
    description: "AnsibleTest port classification"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: create_result

- name: Assert port classification was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.port_classification.name == test_port_class_name

# ── Verify creation with info module ──
- name: Verify port classification exists via info module
  microsoft.scvmm.scvmm_port_classification_info:
    name: "{{ test_port_class_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: verify_create

- name: Assert info module sees the created classification
  ansible.builtin.assert:
    that:
      - verify_create.port_classifications | length == 1
      - verify_create.port_classifications[0].name == test_port_class_name
      - verify_create.port_classifications[0].id is defined
      - verify_create.port_classifications[0].description == "AnsibleTest port classification"

# ── Idempotency ──
- name: Create same port classification again
  microsoft.scvmm.scvmm_port_classification:
    name: "{{ test_port_class_name }}"
    description: "AnsibleTest port classification"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: idempotent_result

- name: Assert no change on idempotent create
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed

# ── Update description ──
- name: Update port classification description
  microsoft.scvmm.scvmm_port_classification:
    name: "{{ test_port_class_name }}"
    description: "Updated test description"
    vmm_server: "{{ scvmm_server }}"
  register: update_result

- name: Assert description was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.port_classification.description == "Updated test description"

# ── Verify update with info module ──
- name: Verify description update via info module
  microsoft.scvmm.scvmm_port_classification_info:
    name: "{{ test_port_class_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: verify_update

- name: Assert info module sees updated description
  ansible.builtin.assert:
    that:
      - verify_update.port_classifications[0].description == "Updated test description"

# ── Check mode ──
- name: Update description in check mode
  microsoft.scvmm.scvmm_port_classification:
    name: "{{ test_port_class_name }}"
    description: "Check mode description"
    vmm_server: "{{ scvmm_server }}"
  check_mode: true
  register: check_mode_result

- name: Assert check mode reports change
  ansible.builtin.assert:
    that:
      - check_mode_result is changed

- name: Verify check mode did not actually change description
  microsoft.scvmm.scvmm_port_classification_info:
    name: "{{ test_port_class_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: verify_check_mode

- name: Assert description unchanged after check mode
  ansible.builtin.assert:
    that:
      - verify_check_mode.port_classifications[0].description == "Updated test description"

# ── Delete port classification ──
- name: Delete port classification
  microsoft.scvmm.scvmm_port_classification:
    name: "{{ test_port_class_name }}"
    state: absent
    vmm_server: "{{ scvmm_server }}"
  register: delete_result

- name: Assert classification was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed

# ── Verify deletion with info module ──
- name: Verify port classification is gone via info module
  microsoft.scvmm.scvmm_port_classification_info:
    name: "{{ test_port_class_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: verify_delete

- name: Assert info module returns empty for deleted classification
  ansible.builtin.assert:
    that:
      - verify_delete.port_classifications | length == 0

# ── Absent idempotency ──
- name: Delete already-deleted port classification
  microsoft.scvmm.scvmm_port_classification:
    name: "{{ test_port_class_name }}"
    state: absent
    vmm_server: "{{ scvmm_server }}"
  register: absent_noop

- name: Assert no change on absent idempotency
  ansible.builtin.assert:
    that:
      - absent_noop is not changed
