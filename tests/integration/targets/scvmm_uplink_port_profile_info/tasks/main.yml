---
- name: Define test variables
  ansible.builtin.set_fact:
    test_profile_name: "AnsibleTest_UplinkInfo_{{ 99999 | random }}"

- block:
    - name: Setup - Create uplink port profile
      microsoft.scvmm.scvmm_uplink_port_profile:
        name: "{{ test_profile_name }}"
        description: "Info test uplink profile"
        state: present
        vmm_server: "{{ scvmm_server }}"

    - name: Run tests
      ansible.builtin.include_tasks: tests.yml

  always:
    - name: Teardown - Remove test profile
      microsoft.scvmm.scvmm_uplink_port_profile:
        name: "{{ test_profile_name }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true
