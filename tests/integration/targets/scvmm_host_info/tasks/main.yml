---
- name: Save original host state via action module
  microsoft.scvmm.scvmm_host:
    name: "{{ test_host_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: original_state

- name: Store original description
  set_fact:
    original_description: "{{ original_state.host.description | default('') }}"

- block:
    - name: Setup - Set known host description via action module
      microsoft.scvmm.scvmm_host:
        name: "{{ test_host_name }}"
        description: "InfoTest_HostDescription"
        vmm_server: "{{ scvmm_server }}"

    - name: Run tests
      ansible.builtin.include_tasks: tests.yml

  always:
    - name: Teardown - Restore original description via action module
      microsoft.scvmm.scvmm_host:
        name: "{{ test_host_name }}"
        description: "{{ original_description }}"
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true
