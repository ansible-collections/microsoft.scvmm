---
- name: Define test variables
  set_fact:
    test_vm: "AnsibleTest_DVD_{{ 99999 | random }}"

- block:
    - name: Setup - Create test VM
      microsoft.scvmm.scvmm_vm:
        name: "{{ test_vm }}"
        template: "{{ test_vm_template }}"
        vm_host: "{{ test_vm_host }}"
        vmm_server: "{{ scvmm_server }}"
        state: present

    - name: Setup - Discover SCSI adapters on test VM
      microsoft.scvmm.scvmm_vm_scsi_adapter_info:
        vm_name: "{{ test_vm }}"
        vmm_server: "{{ scvmm_server }}"
      register: scsi_info

    - name: Setup - Set non-default bus/lun based on available SCSI adapters
      set_fact:
        test_alt_bus: "{{ (scsi_info.scsi_adapters | length) - 1 if (scsi_info.scsi_adapters | length) > 1 else 0 }}"
        test_alt_lun: "{{ 0 if (scsi_info.scsi_adapters | length) > 1 else 2 }}"

    - name: Run tests
      ansible.builtin.include_tasks: tests.yml

  always:
    - name: Teardown - Remove test VM
      microsoft.scvmm.scvmm_vm:
        name: "{{ test_vm }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true

    - name: Teardown - Validate VM removed
      microsoft.scvmm.scvmm_vm:
        name: "{{ test_vm }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      register: teardown_validate

    - name: Teardown - Assert server is clean
      assert:
        that:
          - teardown_validate.changed == false
