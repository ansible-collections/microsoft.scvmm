---
# ── Create definition ──
- name: Create logical network definition
  microsoft.scvmm.scvmm_logical_network_definition:
    name: "{{ test_def_name }}"
    logical_network: "{{ test_ln_name }}"
    subnet_vlans:
      - subnet: "{{ test_subnet }}"
        vlan_id: "{{ test_vlan_id | int }}"
    host_groups:
      - All Hosts
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: create_result

- name: Assert definition was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.logical_network_definition.name == test_def_name
      - create_result.logical_network_definition.logical_network == test_ln_name
      - create_result.logical_network_definition.id is defined
      - create_result.logical_network_definition.id | length > 0
      - create_result.logical_network_definition.subnet_vlans | length == 1
      - create_result.logical_network_definition.host_groups | length >= 1

# ── Verify creation with info module ──
- name: Verify definition via info module
  microsoft.scvmm.scvmm_logical_network_definition_info:
    name: "{{ test_def_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: verify_create

- name: Assert info module sees the created definition
  ansible.builtin.assert:
    that:
      - verify_create.logical_network_definitions | length == 1
      - verify_create.logical_network_definitions[0].name == test_def_name
      - verify_create.logical_network_definitions[0].logical_network == test_ln_name
      - verify_create.logical_network_definitions[0].id == create_result.logical_network_definition.id

# ── Idempotency ──
- name: Create same definition again (idempotency)
  microsoft.scvmm.scvmm_logical_network_definition:
    name: "{{ test_def_name }}"
    logical_network: "{{ test_ln_name }}"
    subnet_vlans:
      - subnet: "{{ test_subnet }}"
        vlan_id: "{{ test_vlan_id | int }}"
    host_groups:
      - All Hosts
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: idempotent_result

- name: Assert no change on idempotent create
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed

# ── Check mode: update ──
- name: Update definition in check mode with different subnet
  microsoft.scvmm.scvmm_logical_network_definition:
    name: "{{ test_def_name }}"
    logical_network: "{{ test_ln_name }}"
    subnet_vlans:
      - subnet: "172.16.0.0/24"
        vlan_id: 200
    state: present
    vmm_server: "{{ scvmm_server }}"
  check_mode: true
  register: check_mode_update

- name: Assert check mode reports change
  ansible.builtin.assert:
    that:
      - check_mode_update is changed

- name: Verify check mode did not change definition
  microsoft.scvmm.scvmm_logical_network_definition_info:
    name: "{{ test_def_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: after_check

- name: Assert subnet unchanged after check mode
  ansible.builtin.assert:
    that:
      - after_check.logical_network_definitions[0].subnet_vlans | length == 1

# ── Delete definition ──
- name: Remove definition
  microsoft.scvmm.scvmm_logical_network_definition:
    name: "{{ test_def_name }}"
    state: absent
    vmm_server: "{{ scvmm_server }}"
  register: delete_result

- name: Assert definition was removed
  ansible.builtin.assert:
    that:
      - delete_result is changed

# ── Verify deletion with info module ──
- name: Verify deletion via info module
  microsoft.scvmm.scvmm_logical_network_definition_info:
    name: "{{ test_def_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: verify_delete

- name: Assert info module confirms deletion
  ansible.builtin.assert:
    that:
      - verify_delete.logical_network_definitions | length == 0

# ── Absent idempotency ──
- name: Remove definition again (idempotency)
  microsoft.scvmm.scvmm_logical_network_definition:
    name: "{{ test_def_name }}"
    state: absent
    vmm_server: "{{ scvmm_server }}"
  register: delete_idempotent

- name: Assert no change when removing non-existent
  ansible.builtin.assert:
    that:
      - delete_idempotent is not changed

# ── Re-create for teardown validation ──
- name: Re-create definition for teardown
  microsoft.scvmm.scvmm_logical_network_definition:
    name: "{{ test_def_name }}"
    logical_network: "{{ test_ln_name }}"
    subnet_vlans:
      - subnet: "{{ test_subnet }}"
        vlan_id: "{{ test_vlan_id | int }}"
    host_groups:
      - All Hosts
    state: present
    vmm_server: "{{ scvmm_server }}"
