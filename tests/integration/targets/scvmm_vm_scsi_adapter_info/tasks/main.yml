---
- name: Define test variables
  set_fact:
    test_vm: "AnsibleTest_SCSIInfo_{{ 99999 | random }}"

- block:
    - name: Setup - Create test VM
      microsoft.scvmm.scvmm_vm:
        name: "{{ test_vm }}"
        template: "{{ test_vm_template }}"
        vm_host: "{{ test_vm_host }}"
        vmm_server: "{{ scvmm_server }}"
        state: present

    - name: Setup - Get initial adapter count
      microsoft.scvmm.scvmm_vm_scsi_adapter_info:
        vm_name: "{{ test_vm }}"
        vmm_server: "{{ scvmm_server }}"
      register: initial_info

    - name: Setup - Record initial count
      set_fact:
        initial_adapter_count: "{{ initial_info.scsi_adapters | length }}"

    - name: Setup - Add SCSI adapter
      microsoft.scvmm.scvmm_vm_scsi_adapter:
        vm_name: "{{ test_vm }}"
        vmm_server: "{{ scvmm_server }}"
        state: present
      register: setup_adapter

    - name: Setup - Record created adapter GUID
      set_fact:
        created_adapter_guid: "{{ setup_adapter.scsi_adapter.id }}"

    - name: Run tests
      ansible.builtin.include_tasks: tests.yml

  always:
    - name: Teardown - Remove test VM
      microsoft.scvmm.scvmm_vm:
        name: "{{ test_vm }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true

    - name: Teardown - Validate VM removed
      microsoft.scvmm.scvmm_vm:
        name: "{{ test_vm }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      register: teardown_validate

    - name: Teardown - Assert server is clean
      assert:
        that:
          - teardown_validate.changed == false
