---
# ── Create host group ──
- name: Create host group
  microsoft.scvmm.scvmm_host_group:
    name: "{{ test_host_group_name }}"
    description: "Ansible test host group"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: create_result

- name: Assert host group was created with correct values
  assert:
    that:
      - create_result is changed
      - create_result.host_group.name == test_host_group_name
      - create_result.host_group.description == "Ansible test host group"
      - create_result.host_group.id is defined
      - create_result.host_group.id | length > 0
      - create_result.host_group.path is defined
      - create_result.host_group.parent_host_group == "All Hosts"

# ── Idempotency: create same host group again ──
- name: Create same host group again (idempotency)
  microsoft.scvmm.scvmm_host_group:
    name: "{{ test_host_group_name }}"
    description: "Ansible test host group"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: idempotent_result

- name: Assert no change on idempotent create
  assert:
    that:
      - idempotent_result is not changed

# ── Update description ──
- name: Update host group description
  microsoft.scvmm.scvmm_host_group:
    name: "{{ test_host_group_name }}"
    description: "Updated test description"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: update_result

- name: Assert host group was updated
  assert:
    that:
      - update_result is changed
      - update_result.host_group.description == "Updated test description"

# ── Idempotency: same description again ──
- name: Update with same description (idempotency)
  microsoft.scvmm.scvmm_host_group:
    name: "{{ test_host_group_name }}"
    description: "Updated test description"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: update_idempotent

- name: Assert no change on idempotent update
  assert:
    that:
      - update_idempotent is not changed

# ── Check mode: update ──
- name: Update host group in check mode
  microsoft.scvmm.scvmm_host_group:
    name: "{{ test_host_group_name }}"
    description: "Check mode description"
    state: present
    vmm_server: "{{ scvmm_server }}"
  check_mode: true
  register: check_mode_update

- name: Assert check mode reports change
  assert:
    that:
      - check_mode_update is changed

# ── Nested host group ──
- name: Create nested host group
  microsoft.scvmm.scvmm_host_group:
    name: "{{ test_child_group_name }}"
    parent_host_group: "{{ test_host_group_name }}"
    description: "Child host group"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: child_result

- name: Assert child host group was created
  assert:
    that:
      - child_result is changed
      - child_result.host_group.name == test_child_group_name
      - child_result.host_group.parent_host_group == test_host_group_name

# ── Delete child host group ──
- name: Remove child host group
  microsoft.scvmm.scvmm_host_group:
    name: "{{ test_child_group_name }}"
    parent_host_group: "{{ test_host_group_name }}"
    state: absent
    vmm_server: "{{ scvmm_server }}"
  register: delete_child

- name: Assert child was removed
  assert:
    that:
      - delete_child is changed

# ── Delete host group ──
- name: Remove host group
  microsoft.scvmm.scvmm_host_group:
    name: "{{ test_host_group_name }}"
    state: absent
    vmm_server: "{{ scvmm_server }}"
  register: delete_result

- name: Assert host group was removed
  assert:
    that:
      - delete_result is changed

# ── Idempotency: remove already-deleted ──
- name: Remove host group again (idempotency)
  microsoft.scvmm.scvmm_host_group:
    name: "{{ test_host_group_name }}"
    state: absent
    vmm_server: "{{ scvmm_server }}"
  register: delete_idempotent

- name: Assert no change when removing non-existent
  assert:
    that:
      - delete_idempotent is not changed

# ── Re-create for teardown validation ──
- name: Re-create host group for teardown
  microsoft.scvmm.scvmm_host_group:
    name: "{{ test_host_group_name }}"
    state: present
    vmm_server: "{{ scvmm_server }}"
