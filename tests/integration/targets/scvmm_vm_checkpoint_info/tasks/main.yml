---
- name: Define test variables
  set_fact:
    test_vm: "AnsibleTest_ChkInfo_{{ 99999 | random }}"
    test_checkpoint: "TestCheckpoint_{{ 99999 | random }}"

- block:
    - name: Setup - Create test VM
      microsoft.scvmm.scvmm_vm:
        name: "{{ test_vm }}"
        template: "{{ test_vm_template }}"
        vm_host: "{{ test_vm_host }}"
        vmm_server: "{{ scvmm_server }}"
        state: present

    - name: Setup - Create checkpoint on test VM
      microsoft.scvmm.scvmm_vm_checkpoint:
        vm_name: "{{ test_vm }}"
        name: "{{ test_checkpoint }}"
        description: "Test checkpoint for info module"
        vmm_server: "{{ scvmm_server }}"
        state: present

    - name: Run tests
      ansible.builtin.include_tasks: tests.yml

  always:
    - name: Teardown - Remove checkpoint
      microsoft.scvmm.scvmm_vm_checkpoint:
        vm_name: "{{ test_vm }}"
        name: "{{ test_checkpoint }}"
        vmm_server: "{{ scvmm_server }}"
        state: absent
      ignore_errors: true

    - name: Teardown - Remove test VM
      microsoft.scvmm.scvmm_vm:
        name: "{{ test_vm }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true

    - name: Teardown - Validate VM removed
      microsoft.scvmm.scvmm_vm:
        name: "{{ test_vm }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      register: teardown_validate

    - name: Teardown - Assert server is clean
      assert:
        that:
          - teardown_validate.changed == false
