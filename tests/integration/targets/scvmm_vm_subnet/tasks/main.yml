---
- name: Define test variables
  ansible.builtin.set_fact:
    test_ln_name: "AnsibleTest_VMSub_LN_{{ 99999 | random }}"
    test_vmnet_name: "AnsibleTest_VMSub_VMNet_{{ 99999 | random }}"
    test_subnet_name: "AnsibleTest_VMSubnet_{{ 99999 | random }}"
    test_subnet_cidr: "10.99.1.0/24"

- block:
    - name: Setup - Create logical network via PowerShell
      ansible.windows.win_shell: |
        $vmmServer = Get-SCVMMServer "{{ scvmm_server }}"
        $ln = New-SCLogicalNetwork -VMMServer $vmmServer -Name "{{ test_ln_name }}" -EnableNetworkVirtualization $true -UseGRE $true -ErrorAction Stop
        $hg = Get-SCVMHostGroup -VMMServer $vmmServer -Name "All Hosts"
        $subnetVlan = New-SCSubnetVLan -Subnet "10.99.0.0/24" -VLanID 0
        New-SCLogicalNetworkDefinition -Name "{{ test_ln_name }}_LND" -LogicalNetwork $ln -VMHostGroup $hg -SubnetVLan $subnetVlan -ErrorAction Stop | Out-Null
        "created"
      register: setup_ln

    - name: Setup - Create VM network via PowerShell
      ansible.windows.win_shell: |
        $vmmServer = Get-SCVMMServer "{{ scvmm_server }}"
        $ln = Get-SCLogicalNetwork -VMMServer $vmmServer -Name "{{ test_ln_name }}"
        New-SCVMNetwork -VMMServer $vmmServer -Name "{{ test_vmnet_name }}" -LogicalNetwork $ln -IsolationType "WindowsNetworkVirtualization" -ErrorAction Stop | Out-Null
        "created"
      register: setup_vmnet

    - name: Run tests
      ansible.builtin.include_tasks: tests.yml
  always:
    - name: Teardown - Remove VM subnet
      microsoft.scvmm.scvmm_vm_subnet:
        name: "{{ test_subnet_name }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true

    - name: Teardown - Remove VM network via PowerShell
      ansible.windows.win_shell: |
        $vmmServer = Get-SCVMMServer "{{ scvmm_server }}"
        $vmNet = Get-SCVMNetwork -VMMServer $vmmServer -Name "{{ test_vmnet_name }}"
        if ($vmNet) {
          Get-SCVMSubnet -VMNetwork $vmNet | ForEach-Object { Remove-SCVMSubnet -VMSubnet $_ -Force | Out-Null }
          Remove-SCVMNetwork -VMNetwork $vmNet -Force | Out-Null
        }
        "done"
      ignore_errors: true

    - name: Teardown - Remove logical network via PowerShell
      ansible.windows.win_shell: |
        $vmmServer = Get-SCVMMServer "{{ scvmm_server }}"
        $ln = Get-SCLogicalNetwork -VMMServer $vmmServer -Name "{{ test_ln_name }}"
        if ($ln) {
          Get-SCLogicalNetworkDefinition -LogicalNetwork $ln | ForEach-Object { Remove-SCLogicalNetworkDefinition -LogicalNetworkDefinition $_ -Force | Out-Null }
          Remove-SCLogicalNetwork -LogicalNetwork $ln -Force | Out-Null
        }
        "done"
      ignore_errors: true
