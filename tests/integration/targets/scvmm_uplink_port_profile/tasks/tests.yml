---
# ── Create uplink port profile ──
- name: Create uplink port profile
  microsoft.scvmm.scvmm_uplink_port_profile:
    name: "{{ test_profile_name }}"
    description: "Ansible test uplink profile"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: create_result

- name: Assert profile was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.uplink_port_profile.name == test_profile_name
      - create_result.uplink_port_profile.description == "Ansible test uplink profile"
      - create_result.uplink_port_profile.id is defined
      - create_result.uplink_port_profile.id | length > 0

# ── Verify creation with info module ──
- name: Verify profile via info module
  microsoft.scvmm.scvmm_uplink_port_profile_info:
    name: "{{ test_profile_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: verify_create

- name: Assert info module sees the created profile
  ansible.builtin.assert:
    that:
      - verify_create.uplink_port_profiles | length == 1
      - verify_create.uplink_port_profiles[0].name == test_profile_name
      - verify_create.uplink_port_profiles[0].description == "Ansible test uplink profile"
      - verify_create.uplink_port_profiles[0].id == create_result.uplink_port_profile.id

# ── Idempotency ──
- name: Create same profile again (idempotency)
  microsoft.scvmm.scvmm_uplink_port_profile:
    name: "{{ test_profile_name }}"
    description: "Ansible test uplink profile"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: idempotent_result

- name: Assert no change on idempotent create
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed

# ── Update description ──
- name: Update profile description
  microsoft.scvmm.scvmm_uplink_port_profile:
    name: "{{ test_profile_name }}"
    description: "Updated uplink profile"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: update_result

- name: Assert profile was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.uplink_port_profile.description == "Updated uplink profile"

# ── Verify update with info module ──
- name: Verify update via info module
  microsoft.scvmm.scvmm_uplink_port_profile_info:
    name: "{{ test_profile_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: verify_update

- name: Assert info module sees updated description
  ansible.builtin.assert:
    that:
      - verify_update.uplink_port_profiles[0].description == "Updated uplink profile"

# ── Check mode ──
- name: Update profile in check mode
  microsoft.scvmm.scvmm_uplink_port_profile:
    name: "{{ test_profile_name }}"
    description: "Check mode description"
    state: present
    vmm_server: "{{ scvmm_server }}"
  check_mode: true
  register: check_mode_update

- name: Assert check mode reports change
  ansible.builtin.assert:
    that:
      - check_mode_update is changed

- name: Verify description unchanged after check mode
  microsoft.scvmm.scvmm_uplink_port_profile_info:
    name: "{{ test_profile_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: after_check

- name: Assert description still has previous value
  ansible.builtin.assert:
    that:
      - after_check.uplink_port_profiles[0].description == "Updated uplink profile"

# ── Delete ──
- name: Remove profile
  microsoft.scvmm.scvmm_uplink_port_profile:
    name: "{{ test_profile_name }}"
    state: absent
    vmm_server: "{{ scvmm_server }}"
  register: delete_result

- name: Assert profile was removed
  ansible.builtin.assert:
    that:
      - delete_result is changed

# ── Verify deletion with info module ──
- name: Verify deletion via info module
  microsoft.scvmm.scvmm_uplink_port_profile_info:
    name: "{{ test_profile_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: verify_delete

- name: Assert info module confirms deletion
  ansible.builtin.assert:
    that:
      - verify_delete.uplink_port_profiles | length == 0

# ── Absent idempotency ──
- name: Remove profile again (idempotency)
  microsoft.scvmm.scvmm_uplink_port_profile:
    name: "{{ test_profile_name }}"
    state: absent
    vmm_server: "{{ scvmm_server }}"
  register: delete_idempotent

- name: Assert no change when removing non-existent
  ansible.builtin.assert:
    that:
      - delete_idempotent is not changed

# ── Re-create for teardown ──
- name: Re-create profile for teardown
  microsoft.scvmm.scvmm_uplink_port_profile:
    name: "{{ test_profile_name }}"
    state: present
    vmm_server: "{{ scvmm_server }}"
