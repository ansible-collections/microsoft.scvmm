---
- name: Define test variables
  ansible.builtin.set_fact:
    test_ln_name: "AnsibleTest_LNInfo_{{ 99999 | random }}"

- block:
    - name: Setup - Create logical network for info tests
      microsoft.scvmm.scvmm_logical_network:
        name: "{{ test_ln_name }}"
        description: "Info test logical network"
        state: present
        vmm_server: "{{ scvmm_server }}"

    - name: Run tests
      ansible.builtin.include_tasks: tests.yml

  always:
    - name: Teardown - Remove test logical network
      microsoft.scvmm.scvmm_logical_network:
        name: "{{ test_ln_name }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true
