---
# ── Update description ──
- name: Update host description
  microsoft.scvmm.scvmm_host:
    name: "{{ test_host_name }}"
    description: "AnsibleTest_HostDesc"
    vmm_server: "{{ scvmm_server }}"
  register: update_result

- name: Assert description was updated
  assert:
    that:
      - update_result is changed
      - update_result.host.description == "AnsibleTest_HostDesc"

# ── Verify host exists via info module ──
- name: Verify host via info module
  microsoft.scvmm.scvmm_host_info:
    name: "{{ test_host_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: verify_update

- name: Assert info module sees the host
  assert:
    that:
      - verify_update.hosts | length == 1
      - verify_update.hosts[0].name == test_host_name
      - verify_update.hosts[0].id is defined

# ── Idempotency ──
- name: Set same description again
  microsoft.scvmm.scvmm_host:
    name: "{{ test_host_name }}"
    description: "AnsibleTest_HostDesc"
    vmm_server: "{{ scvmm_server }}"
  register: idempotent_result

- name: Assert no change on idempotent update
  assert:
    that:
      - idempotent_result is not changed

# ── Check mode ──
- name: Update description in check mode
  microsoft.scvmm.scvmm_host:
    name: "{{ test_host_name }}"
    description: "CheckMode_HostDesc"
    vmm_server: "{{ scvmm_server }}"
  check_mode: true
  register: check_mode_result

- name: Assert check mode reports change
  assert:
    that:
      - check_mode_result is changed

- name: Verify check mode did not actually change via action module
  microsoft.scvmm.scvmm_host:
    name: "{{ test_host_name }}"
    description: "AnsibleTest_HostDesc"
    vmm_server: "{{ scvmm_server }}"
  register: verify_check_mode

- name: Assert description unchanged after check mode
  assert:
    that:
      - verify_check_mode is not changed
