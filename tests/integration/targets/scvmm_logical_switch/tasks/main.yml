---
- name: Define test variables
  ansible.builtin.set_fact:
    test_switch_name: "AnsibleTest_LogSwitch_{{ 99999 | random }}"

- block:
    - name: Run tests
      ansible.builtin.include_tasks: tests.yml
  always:
    - name: Teardown - Remove logical switch
      microsoft.scvmm.scvmm_logical_switch:
        name: "{{ test_switch_name }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true
