---
- name: Define test variables
  ansible.builtin.set_fact:
    test_port_class_name: "AnsibleTest_PortClassInfo_{{ 99999 | random }}"

- block:
    - name: Setup - Create port classification for info tests
      microsoft.scvmm.scvmm_port_classification:
        name: "{{ test_port_class_name }}"
        description: "InfoTest port classification"
        state: present
        vmm_server: "{{ scvmm_server }}"

    - name: Run tests
      ansible.builtin.include_tasks: tests.yml

  always:
    - name: Teardown - Remove test port classification
      microsoft.scvmm.scvmm_port_classification:
        name: "{{ test_port_class_name }}"
        state: absent
        vmm_server: "{{ scvmm_server }}"
      ignore_errors: true
