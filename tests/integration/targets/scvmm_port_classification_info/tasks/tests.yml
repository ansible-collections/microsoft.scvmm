---
# ── Query by name ──
- name: Get port classification by name
  microsoft.scvmm.scvmm_port_classification_info:
    name: "{{ test_port_class_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: by_name

- name: Assert query by name returns expected result
  ansible.builtin.assert:
    that:
      - by_name is not changed
      - by_name.port_classifications | length == 1
      - by_name.port_classifications[0].name == test_port_class_name
      - by_name.port_classifications[0].description == "InfoTest port classification"
      - by_name.port_classifications[0].id is defined

# ── Query all ──
- name: Get all port classifications
  microsoft.scvmm.scvmm_port_classification_info:
    vmm_server: "{{ scvmm_server }}"
  register: all_classifications

- name: Assert all query returns results including test classification
  ansible.builtin.assert:
    that:
      - all_classifications is not changed
      - all_classifications.port_classifications | length > 0
      - test_port_class_name in (all_classifications.port_classifications | map(attribute='name') | list)

# ── Query non-existent ──
- name: Get non-existent port classification
  microsoft.scvmm.scvmm_port_classification_info:
    name: "NonExistent_PortClass_{{ 99999 | random }}"
    vmm_server: "{{ scvmm_server }}"
  register: non_existent

- name: Assert non-existent query returns empty list
  ansible.builtin.assert:
    that:
      - non_existent is not changed
      - non_existent.port_classifications | length == 0

# ── Stability ──
- name: Query same classification again
  microsoft.scvmm.scvmm_port_classification_info:
    name: "{{ test_port_class_name }}"
    vmm_server: "{{ scvmm_server }}"
  register: second_query

- name: Assert repeated query returns consistent results
  ansible.builtin.assert:
    that:
      - second_query.port_classifications | length == by_name.port_classifications | length
      - second_query.port_classifications[0].id == by_name.port_classifications[0].id
