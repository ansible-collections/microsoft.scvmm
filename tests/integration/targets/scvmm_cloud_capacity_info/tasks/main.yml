---
- hosts: windows
  gather_facts: false
  vars_files:
    - ../defaults/main.yml
  tasks:
    - name: Define test variables
      set_fact:
        test_cloud_name: "AnsibleTest_CloudCapInfo_{{ 99999 | random }}"
        test_host_group: "All Hosts"

    - block:
        - name: Setup - Create test cloud
          microsoft.scvmm.scvmm_cloud:
            name: "{{ test_cloud_name }}"
            host_group: "{{ test_host_group }}"
            state: present
            vmm_server: "{{ scvmm_server }}"

        - name: Setup - Set known capacity values
          microsoft.scvmm.scvmm_cloud_capacity:
            cloud: "{{ test_cloud_name }}"
            cpu_count: 8
            memory_gb: 32
            storage_gb: 200
            vm_count: 10
            vmm_server: "{{ scvmm_server }}"

        - name: Run tests
          ansible.builtin.include_tasks: tests.yml

      always:
        - name: Teardown - Remove test cloud
          microsoft.scvmm.scvmm_cloud:
            name: "{{ test_cloud_name }}"
            state: absent
            vmm_server: "{{ scvmm_server }}"
          ignore_errors: true
