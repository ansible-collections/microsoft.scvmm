---
# ── Create cloud ──
- name: Create cloud
  microsoft.scvmm.scvmm_cloud:
    name: "{{ test_cloud_name }}"
    host_group: "{{ test_vm_host_group }}"
    description: "Ansible test cloud"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: create_result

- name: Assert cloud was created with correct values
  assert:
    that:
      - create_result is changed
      - create_result.cloud.name == test_cloud_name
      - create_result.cloud.description == "Ansible test cloud"
      - create_result.cloud.id is defined
      - create_result.cloud.id | length > 0
      - create_result.cloud.host_groups is defined
      - test_vm_host_group in create_result.cloud.host_groups

# ── Idempotency: create same cloud again ──
- name: Create same cloud again (idempotency)
  microsoft.scvmm.scvmm_cloud:
    name: "{{ test_cloud_name }}"
    host_group: "{{ test_vm_host_group }}"
    description: "Ansible test cloud"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: idempotent_result

- name: Assert no change on idempotent create
  assert:
    that:
      - idempotent_result is not changed

# ── Update description ──
- name: Update cloud description
  microsoft.scvmm.scvmm_cloud:
    name: "{{ test_cloud_name }}"
    host_group: "{{ test_vm_host_group }}"
    description: "Updated test cloud"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: update_result

- name: Assert cloud was updated
  assert:
    that:
      - update_result is changed
      - update_result.cloud.description == "Updated test cloud"

# ── Idempotency: same description again ──
- name: Update with same description (idempotency)
  microsoft.scvmm.scvmm_cloud:
    name: "{{ test_cloud_name }}"
    host_group: "{{ test_vm_host_group }}"
    description: "Updated test cloud"
    state: present
    vmm_server: "{{ scvmm_server }}"
  register: update_idempotent

- name: Assert no change on idempotent update
  assert:
    that:
      - update_idempotent is not changed

# ── Check mode: update ──
- name: Update cloud in check mode
  microsoft.scvmm.scvmm_cloud:
    name: "{{ test_cloud_name }}"
    host_group: "{{ test_vm_host_group }}"
    description: "Check mode description"
    state: present
    vmm_server: "{{ scvmm_server }}"
  check_mode: true
  register: check_mode_update

- name: Assert check mode reports change
  assert:
    that:
      - check_mode_update is changed

# ── Delete cloud ──
- name: Remove cloud
  microsoft.scvmm.scvmm_cloud:
    name: "{{ test_cloud_name }}"
    state: absent
    vmm_server: "{{ scvmm_server }}"
  register: delete_result

- name: Assert cloud was removed
  assert:
    that:
      - delete_result is changed

# ── Idempotency: remove already-deleted ──
- name: Remove cloud again (idempotency)
  microsoft.scvmm.scvmm_cloud:
    name: "{{ test_cloud_name }}"
    state: absent
    vmm_server: "{{ scvmm_server }}"
  register: delete_idempotent

- name: Assert no change when removing non-existent
  assert:
    that:
      - delete_idempotent is not changed

# ── Re-create for teardown validation ──
- name: Re-create cloud for teardown
  microsoft.scvmm.scvmm_cloud:
    name: "{{ test_cloud_name }}"
    host_group: "{{ test_vm_host_group }}"
    state: present
    vmm_server: "{{ scvmm_server }}"
