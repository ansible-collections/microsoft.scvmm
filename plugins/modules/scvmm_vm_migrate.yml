---
DOCUMENTATION:
  module: scvmm_vm_migrate
  short_description: Migrate SCVMM virtual machines between hosts and storage
  version_added: "1.0.0"
  description:
    - Migrate virtual machines in System Center Virtual Machine Manager (SCVMM).
    - Supports live migration (VM remains running during migration).
    - Supports storage migration (move VM files to different storage path).
    - Supports combined migration (move VM to different host AND different storage in one operation).
    - SCVMM automatically selects the fastest migration method available (live migration, cluster migration, SAN migration, or network transfer).
    - Can force specific migration methods if needed.
  options:
    name:
      description:
        - Name of the virtual machine to migrate.
      type: str
      required: true
    vmm_server:
      description:
        - Hostname or FQDN of the SCVMM server.
      type: str
      required: true
    destination_host:
      description:
        - Name of the destination Hyper-V host.
        - Required for host migration.
        - Must specify at least one of I(destination_host) or I(destination_path).
      type: str
      required: false
    destination_path:
      description:
        - Destination path for the VM files on the target host.
        - Required for storage migration.
        - Must specify at least one of I(destination_host) or I(destination_path).
        - For network and SAN transfers, this is the local path on the destination host.
        - Example C(D:\VirtualMachines\VM01)
      type: str
      required: false
    migration_type:
      description:
        - Migration method to use.
        - C(auto) - Let SCVMM automatically select the fastest available method (default).
        - C(live) - Prefer live migration (VM stays running, requires cluster or standalone live migration support).
        - C(cluster) - Use cluster migration (quick migration) for VMs in saved state.
        - C(lan) - Force network transfer over LAN even if faster methods (SAN, live migration) are available.
        - When C(auto), SCVMM tries methods in this order Hyper-V live migration, cluster migration, SAN migration, network transfer.
      type: str
      required: false
      default: auto
      choices:
        - auto
        - live
        - cluster
        - lan
    start_vm_on_target:
      description:
        - Start the VM immediately after migration completes.
        - Only applies if the VM was stopped before migration.
      type: bool
      default: false
    highly_available:
      description:
        - Configure the VM as highly available on the destination host.
        - Only applicable when migrating to a clustered host.
      type: bool
      required: false
    block_if_host_busy:
      description:
        - Block retrying live migration if source or destination host is already participating in another live migration.
        - Prevents migration queue buildup.
      type: bool
      default: false
    timeout:
      description:
        - Maximum time in seconds to wait for migration to complete.
        - Large VMs or slow networks may require longer timeouts.
      type: int
      default: 600
  notes:
    - Requires the VirtualMachineManager PowerShell module installed on the target Windows host.
    - Requires SCVMM 2019 or later.
    - This module is idempotent - will not migrate if VM is already at the desired location.
    - Live migration requires VM to be running and both hosts to support live migration (cluster or standalone).
    - For live migration between standalone hosts, both hosts must be configured for live migration.
    - Storage migration can be performed on running VMs without downtime.
    - Combined host and storage migration is supported in a single operation.
    - Migration method is automatically selected based on VM state, host capabilities, and storage configuration.
    - At least one of I(destination_host) or I(destination_path) must be specified.
  requirements:
    - Windows Server 2016 or later
    - PowerShell 5.1 or later
    - VirtualMachineManager PowerShell module
    - SCVMM 2019 or later
  author:
    - Generated by Jarvis Universal Ansible Collection Swarm

EXAMPLES: |
  - name: Live migrate VM to another host (automatic method selection)
    microsoft.scvmm.scvmm_vm_migrate:
      name: WebServer01
      vmm_server: scvmm01.domain.com
      destination_host: hyperv02.domain.com

  - name: Storage migration - move VM files to new path on same host
    microsoft.scvmm.scvmm_vm_migrate:
      name: DatabaseVM01
      vmm_server: scvmm01.domain.com
      destination_path: E:\VirtualMachines\DatabaseVM01

  - name: Combined migration - move to different host and storage path
    microsoft.scvmm.scvmm_vm_migrate:
      name: AppServer01
      vmm_server: scvmm01.domain.com
      destination_host: hyperv03.domain.com
      destination_path: D:\VMs\AppServer01

  - name: Force live migration method
    microsoft.scvmm.scvmm_vm_migrate:
      name: CriticalVM01
      vmm_server: scvmm01.domain.com
      destination_host: hyperv04.domain.com
      migration_type: live

  - name: Force network transfer migration
    microsoft.scvmm.scvmm_vm_migrate:
      name: TestVM01
      vmm_server: scvmm01.domain.com
      destination_host: hyperv05.domain.com
      destination_path: C:\VMs\TestVM01
      migration_type: lan

  - name: Migrate VM and start it on target
    microsoft.scvmm.scvmm_vm_migrate:
      name: WebServer02
      vmm_server: scvmm01.domain.com
      destination_host: hyperv06.domain.com
      start_vm_on_target: true

  - name: Migrate VM and make it highly available
    microsoft.scvmm.scvmm_vm_migrate:
      name: HAVM01
      vmm_server: scvmm01.domain.com
      destination_host: cluster-node01.domain.com
      highly_available: true

  - name: Migrate with custom timeout (30 minutes)
    microsoft.scvmm.scvmm_vm_migrate:
      name: LargeVM01
      vmm_server: scvmm01.domain.com
      destination_host: hyperv07.domain.com
      destination_path: E:\VMs\LargeVM01
      timeout: 1800

  - name: Block migration if host is busy with another migration
    microsoft.scvmm.scvmm_vm_migrate:
      name: PriorityVM01
      vmm_server: scvmm01.domain.com
      destination_host: hyperv08.domain.com
      block_if_host_busy: true

  - name: Use cluster migration for saved state VM
    microsoft.scvmm.scvmm_vm_migrate:
      name: SavedVM01
      vmm_server: scvmm01.domain.com
      destination_host: cluster-node02.domain.com
      migration_type: cluster

RETURN: |
  msg:
    description: Human-readable message describing the migration operation performed.
    returned: always
    type: str
    sample: "VM migrated successfully (host: hyperv01.domain.com -> hyperv02.domain.com, path: D:\VMs\VM01 -> E:\VMs\VM01)"

  vm_name:
    description: Name of the virtual machine.
    returned: always
    type: str
    sample: "WebServer01"

  source_host:
    description: Name of the source Hyper-V host where the VM was located before migration.
    returned: always
    type: str
    sample: "hyperv01.domain.com"

  destination_host:
    description: Name of the destination Hyper-V host where the VM is located after migration.
    returned: always
    type: str
    sample: "hyperv02.domain.com"

  source_path:
    description: Storage path of the VM before migration.
    returned: always
    type: str
    sample: "D:\\VirtualMachines\\WebServer01"

  destination_path:
    description: Storage path of the VM after migration.
    returned: always
    type: str
    sample: "E:\\VirtualMachines\\WebServer01"

  migration_method:
    description: Migration method used or planned.
    returned: always
    type: str
    sample: "live_migration"

  changed:
    description: Whether the VM was migrated.
    returned: always
    type: bool
    sample: true
