---
DOCUMENTATION:
  module: scvmm_vm_state
  short_description: Manage SCVMM virtual machine power state
  version_added: "1.0.0"
  description:
    - Manage the power state of virtual machines in System Center Virtual Machine Manager (SCVMM).
    - Start, stop, restart, suspend, save, or pause VMs.
    - Supports graceful and forced operations.
    - Waits for state transitions to complete before returning.
  options:
    name:
      description:
        - Name of the virtual machine to manage.
      type: str
      required: true
    vmm_server:
      description:
        - Hostname or FQDN of the SCVMM server.
      type: str
      required: true
    state:
      description:
        - Desired power state of the virtual machine.
        - C(started) - Power on the VM (or resume if paused).
        - C(stopped) - Shut down the VM (graceful by default, forced with I(force=true)).
        - C(restarted) - Restart the VM (graceful by default, forced with I(force=true)).
        - C(suspended) - Suspend the VM (saves memory state to disk).
        - C(saved) - Save the VM state to disk.
        - C(paused) - Pause VM execution without writing to disk.
      type: str
      required: true
      choices:
        - started
        - stopped
        - restarted
        - suspended
        - saved
        - paused
    force:
      description:
        - Use forced operations for stop and restart.
        - When C(true), performs hard power-off instead of graceful shutdown.
        - Only applicable to I(state=stopped) and I(state=restarted).
      type: bool
      default: false
    timeout:
      description:
        - Maximum time in seconds to wait for state transition to complete.
      type: int
      default: 300
  notes:
    - Requires the VirtualMachineManager PowerShell module installed on the target Windows host.
    - Requires SCVMM 2019 or later.
    - This module is idempotent - will not change state if VM is already in desired state.
    - The I(restarted) state always reports changed=true even if VM is already running.
  requirements:
    - Windows Server 2016 or later
    - PowerShell 5.1 or later
    - VirtualMachineManager PowerShell module
    - SCVMM 2019 or later
  author:
    - Generated by Jarvis Universal Ansible Collection Swarm

EXAMPLES: |
  - name: Start a virtual machine
    microsoft.scvmm.scvmm_vm_state:
      name: TestVM01
      vmm_server: scvmm01.domain.com
      state: started

  - name: Stop a virtual machine gracefully
    microsoft.scvmm.scvmm_vm_state:
      name: TestVM01
      vmm_server: scvmm01.domain.com
      state: stopped

  - name: Force stop a virtual machine
    microsoft.scvmm.scvmm_vm_state:
      name: TestVM01
      vmm_server: scvmm01.domain.com
      state: stopped
      force: true

  - name: Restart a virtual machine gracefully
    microsoft.scvmm.scvmm_vm_state:
      name: TestVM01
      vmm_server: scvmm01.domain.com
      state: restarted

  - name: Force restart a virtual machine
    microsoft.scvmm.scvmm_vm_state:
      name: TestVM01
      vmm_server: scvmm01.domain.com
      state: restarted
      force: true

  - name: Suspend a virtual machine
    microsoft.scvmm.scvmm_vm_state:
      name: TestVM01
      vmm_server: scvmm01.domain.com
      state: suspended

  - name: Save virtual machine state
    microsoft.scvmm.scvmm_vm_state:
      name: TestVM01
      vmm_server: scvmm01.domain.com
      state: saved

  - name: Pause a virtual machine
    microsoft.scvmm.scvmm_vm_state:
      name: TestVM01
      vmm_server: scvmm01.domain.com
      state: paused

  - name: Resume a paused virtual machine
    microsoft.scvmm.scvmm_vm_state:
      name: TestVM01
      vmm_server: scvmm01.domain.com
      state: started

  - name: Start VM with custom timeout
    microsoft.scvmm.scvmm_vm_state:
      name: TestVM01
      vmm_server: scvmm01.domain.com
      state: started
      timeout: 600

RETURN: |
  msg:
    description: Human-readable message describing the operation performed.
    returned: always
    type: str
    sample: "VM started successfully"

  vm_name:
    description: Name of the virtual machine.
    returned: always
    type: str
    sample: "TestVM01"

  previous_state:
    description: Power state of the VM before the operation.
    returned: always
    type: str
    sample: "stopped"

  current_state:
    description: Power state of the VM after the operation.
    returned: always
    type: str
    sample: "started"

  changed:
    description: Whether the VM state was changed.
    returned: always
    type: bool
    sample: true
