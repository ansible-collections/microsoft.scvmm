---
module: scvmm_vm_info
short_description: Retrieve virtual machine information from SCVMM
description:
  - Retrieves information about virtual machines managed by System Center Virtual Machine Manager (SCVMM).
  - Supports filtering by name, ID, cloud, host group, VM host, and status.
  - Returns detailed information including CPU, memory, network adapters, checkpoints, and more.
version_added: "1.0.0"
options:
  vmm_server:
    description:
      - The SCVMM server to connect to.
      - If not specified, connects to localhost.
    type: str
    required: false
  name:
    description:
      - Name of the virtual machine to retrieve.
      - If not specified, retrieves all virtual machines (subject to other filters).
    type: str
    required: false
  id:
    description:
      - ID (GUID) of the virtual machine to retrieve.
      - Takes precedence over name filter if both are specified.
    type: str
    required: false
  cloud:
    description:
      - Filter VMs by cloud name.
      - Returns only VMs belonging to the specified cloud.
    type: str
    required: false
  host_group:
    description:
      - Filter VMs by host group.
      - Matches VMs whose host group path contains the specified string.
    type: str
    required: false
  vm_host:
    description:
      - Filter VMs by the name of the Hyper-V host.
      - Returns only VMs running on the specified host.
    type: str
    required: false
  status:
    description:
      - Filter VMs by their current status.
    type: str
    required: false
    choices:
      - Running
      - Stopped
      - Paused
      - Saved
      - PowerOff
      - HostNotResponding
      - UnderCreation
      - UnderUpdate
      - Missing
notes:
  - This module is read-only and makes no changes to SCVMM or virtual machines.
  - Check mode is supported (the module always runs in a read-only manner).
  - Requires the VirtualMachineManager PowerShell module to be installed on the target Windows host.
  - Requires SCVMM 2016 or later.
requirements:
  - PowerShell module VirtualMachineManager
  - SCVMM 2016 or later
author:
  - Generated by Jarvis Universal Ansible Collection Swarm
seealso:
  - module: microsoft.scvmm.scvmm_vm
  - module: microsoft.scvmm.scvmm_vm_state

examples: |
  - name: Get all virtual machines
    microsoft.scvmm.scvmm_vm_info:
      vmm_server: scvmm01.domain.com
    register: all_vms

  - name: Get specific VM by name
    microsoft.scvmm.scvmm_vm_info:
      vmm_server: scvmm01.domain.com
      name: WebServer01
    register: vm_info

  - name: Get VM by ID
    microsoft.scvmm.scvmm_vm_info:
      vmm_server: scvmm01.domain.com
      id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    register: vm_info

  - name: Get all running VMs
    microsoft.scvmm.scvmm_vm_info:
      vmm_server: scvmm01.domain.com
      status: Running
    register: running_vms

  - name: Get VMs in a specific cloud
    microsoft.scvmm.scvmm_vm_info:
      vmm_server: scvmm01.domain.com
      cloud: Production-Cloud
    register: cloud_vms

  - name: Get VMs on a specific host
    microsoft.scvmm.scvmm_vm_info:
      vmm_server: scvmm01.domain.com
      vm_host: hyperv01.domain.com
    register: host_vms

  - name: Get VMs in a specific host group
    microsoft.scvmm.scvmm_vm_info:
      vmm_server: scvmm01.domain.com
      host_group: Production
    register: hostgroup_vms

  - name: Combine multiple filters
    microsoft.scvmm.scvmm_vm_info:
      vmm_server: scvmm01.domain.com
      cloud: Production-Cloud
      status: Running
      vm_host: hyperv01.domain.com
    register: filtered_vms

  - name: Display VM names and status
    microsoft.scvmm.scvmm_vm_info:
      vmm_server: scvmm01.domain.com
    register: vms

  - name: Show results
    debug:
      msg: "VM {{ item.name }} is {{ item.status }}"
    loop: "{{ vms.vms }}"

return:
  vms:
    description: List of virtual machines matching the filter criteria
    returned: always
    type: list
    elements: dict
    contains:
      name:
        description: Name of the virtual machine
        type: str
        sample: "WebServer01"
      id:
        description: Unique identifier (GUID) of the virtual machine
        type: str
        sample: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      status:
        description: Current status of the virtual machine
        type: str
        sample: "Running"
      cpu_count:
        description: Number of virtual CPUs assigned to the VM
        type: int
        sample: 4
      memory:
        description: Amount of memory assigned to the VM in MB
        type: int
        sample: 8192
      host:
        description: Name of the Hyper-V host running the VM
        type: str
        sample: "hyperv01.domain.com"
      cloud:
        description: Name of the cloud the VM belongs to
        type: str
        sample: "Production-Cloud"
      vm_network:
        description: List of virtual network adapters attached to the VM
        type: list
        elements: dict
        contains:
          name:
            description: Name of the network adapter
            type: str
            sample: "Network Adapter 1"
          mac_address:
            description: MAC address of the adapter
            type: str
            sample: "00:15:5D:01:02:03"
          vlan_enabled:
            description: Whether VLAN is enabled on the adapter
            type: bool
            sample: true
          vlan_id:
            description: VLAN ID if VLAN is enabled
            type: int
            sample: 100
          vm_network:
            description: Name of the VM network
            type: str
            sample: "Production-Network"
          vm_subnet:
            description: Name of the VM subnet
            type: str
            sample: "Production-Subnet"
          ipv4_addresses:
            description: List of IPv4 addresses assigned to the adapter
            type: list
            elements: str
            sample: ["192.168.1.10"]
          ipv6_addresses:
            description: List of IPv6 addresses assigned to the adapter
            type: list
            elements: str
            sample: ["fe80::1"]
      checkpoints:
        description: Number of checkpoints (snapshots) for the VM
        type: int
        sample: 2
      creation_time:
        description: Timestamp when the VM was created
        type: str
        sample: "2026-01-15T10:30:00"
      description:
        description: Description of the virtual machine
        type: str
        sample: "Production web server"
      owner:
        description: Owner of the virtual machine
        type: str
        sample: "DOMAIN\\username"
      cost_center:
        description: Cost center associated with the VM
        type: str
        sample: "IT-Department"
      tag:
        description: Tag assigned to the VM
        type: str
        sample: "production"
      operating_system:
        description: Operating system running on the VM
        type: str
        sample: "Windows Server 2022 Datacenter"
      library_server:
        description: Library server associated with the VM
        type: str
        sample: "library01.domain.com"
      enabled:
        description: Whether the VM is enabled
        type: bool
        sample: true
      is_highly_available:
        description: Whether the VM is configured for high availability
        type: bool
        sample: false
      location:
        description: Physical location of the VM
        type: str
        sample: "Datacenter-A"
      path:
        description: Path to the VM configuration file
        type: str
        sample: "C:\\ClusterStorage\\Volume1\\VMs\\WebServer01"
