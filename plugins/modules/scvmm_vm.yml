DOCUMENTATION:
  module: scvmm_vm
  short_description: Manage SCVMM virtual machines
  description:
    - Create, update, and delete virtual machines in System Center Virtual Machine Manager (SCVMM).
    - Supports creation from templates or direct placement in clouds.
    - Provides idempotent management of VM hardware, guest OS configuration, and behavior settings.
    - Supports automatic host placement via SCVMM host ratings or manual placement on specific hosts.
  version_added: "1.0.0"
  requirements:
    - PowerShell module VirtualMachineManager
    - SCVMM 2019 or later
  options:
    name:
      description:
        - Name of the virtual machine.
        - Must be unique within the SCVMM environment.
      type: str
      required: true
    vmm_server:
      description:
        - FQDN or hostname of the SCVMM server to connect to.
        - If not specified, connects to the default SCVMM server.
      type: str
    state:
      description:
        - Desired state of the virtual machine.
        - V(present) ensures the VM exists with specified configuration.
        - V(absent) ensures the VM is removed.
      type: str
      default: present
      choices:
        - present
        - absent
    template:
      description:
        - Name of the VM template to use for creating the virtual machine.
        - Required when O(state=present) unless O(cloud) is specified.
        - Mutually exclusive with O(cloud) when both are used for creation.
      type: str
    vm_host:
      description:
        - Hostname or FQDN of the Hyper-V host where the VM should be placed.
        - If not specified, SCVMM will use automatic placement based on host ratings.
        - Mutually exclusive with O(cloud).
      type: str
    cloud:
      description:
        - Name of the SCVMM cloud to place the VM in.
        - Required when O(state=present) unless O(template) is specified.
        - Mutually exclusive with O(vm_host).
      type: str
    host_group:
      description:
        - Name of the host group to use for automatic VM placement.
        - SCVMM will select the best host within this group based on ratings.
      type: str
    cpu_count:
      description:
        - Number of virtual CPUs to assign to the VM.
        - Can be modified after VM creation.
      type: int
    memory_mb:
      description:
        - Amount of RAM in megabytes to assign to the VM.
        - Can be modified after VM creation (may require VM restart).
      type: int
    dynamic_memory_enabled:
      description:
        - Enable or disable dynamic memory for the VM.
        - When enabled, memory can grow/shrink between O(dynamic_memory_min_mb) and O(dynamic_memory_max_mb).
      type: bool
    dynamic_memory_min_mb:
      description:
        - Minimum amount of RAM in megabytes when dynamic memory is enabled.
        - Only applies when O(dynamic_memory_enabled=true).
      type: int
    dynamic_memory_max_mb:
      description:
        - Maximum amount of RAM in megabytes when dynamic memory is enabled.
        - Only applies when O(dynamic_memory_enabled=true).
      type: int
    hardware_profile:
      description:
        - Name of a pre-configured hardware profile to apply to the VM.
        - Hardware profiles define CPU, memory, and other hardware settings.
      type: str
    generation:
      description:
        - VM generation (1 or 2).
        - Generation 2 VMs support UEFI, secure boot, and other modern features.
        - Can only be set during VM creation.
      type: int
      choices:
        - 1
        - 2
    computer_name:
      description:
        - Computer name to assign to the guest OS during deployment.
        - Used for guest OS customization (sysprep/cloud-init).
      type: str
    guest_os_profile:
      description:
        - Name of a guest OS profile to use for OS customization.
        - Profiles contain domain join, product key, and other OS settings.
      type: str
    full_name:
      description:
        - Full name of the registered user for Windows guest OS customization.
      type: str
    organization_name:
      description:
        - Organization name for Windows guest OS customization.
      type: str
    product_key:
      description:
        - Windows product key for OS activation.
        - Used during guest OS customization.
      type: str
      no_log: true
    time_zone:
      description:
        - Time zone index for Windows guest OS customization.
        - See Microsoft documentation for valid time zone index values.
      type: int
    domain:
      description:
        - Active Directory domain to join the VM to during deployment.
        - Mutually exclusive with O(workgroup).
      type: str
    workgroup:
      description:
        - Workgroup to join the VM to during deployment.
        - Mutually exclusive with O(domain).
      type: str
    local_admin_password:
      description:
        - Local administrator password for guest OS customization.
      type: str
      no_log: true
    vm_network:
      description:
        - Name of the VM network to connect the VM to.
        - VM networks provide logical network isolation in SCVMM.
      type: str
    description:
      description:
        - Description of the virtual machine.
        - Can be modified after VM creation.
      type: str
    start_action:
      description:
        - Action to take when the Hyper-V host starts.
        - V(NeverAutoTurnOnVM) - Never automatically start the VM.
        - V(AlwaysAutoTurnOnVM) - Always automatically start the VM.
        - V(TurnOnVMIfRunningWhenVSStopped) - Start VM only if it was running when host stopped.
      type: str
      choices:
        - NeverAutoTurnOnVM
        - AlwaysAutoTurnOnVM
        - TurnOnVMIfRunningWhenVSStopped
    stop_action:
      description:
        - Action to take when the Hyper-V host stops.
        - V(SaveVM) - Save VM state.
        - V(TurnOffVM) - Turn off VM immediately.
        - V(ShutdownGuestOS) - Initiate graceful shutdown of guest OS.
      type: str
      choices:
        - SaveVM
        - TurnOffVM
        - ShutdownGuestOS
    delay_start_seconds:
      description:
        - Number of seconds to delay VM startup when host starts.
        - Useful to stagger VM startups and reduce host load.
      type: int
    highly_available:
      description:
        - Whether to make the VM highly available using host clustering.
        - Requires the VM to be placed on a host that is part of a failover cluster.
      type: bool
    enable_nested_virtualization:
      description:
        - Enable nested virtualization for the VM.
        - Allows running Hyper-V inside the VM.
        - Requires SCVMM 2019 UR1 or later.
      type: bool
    secure_boot_enabled:
      description:
        - Enable Secure Boot for Generation 2 VMs.
        - Only applicable to Generation 2 VMs.
      type: bool
    checkpoint_type:
      description:
        - Type of checkpoints to use for the VM.
        - V(Disabled) - Checkpoints disabled.
        - V(Production) - Production checkpoints (VSS-based).
        - V(Standard) - Standard checkpoints (saved state).
      type: str
      choices:
        - Disabled
        - Production
        - Standard
    start_vm:
      description:
        - Whether to start the VM after creation.
        - Only applies when creating a new VM.
      type: bool
      default: false
    path:
      description:
        - Path on the Hyper-V host where VM files will be stored.
        - If not specified, SCVMM uses the default VM path configured on the host.
      type: str
  notes:
    - VM creation is an asynchronous operation that may take several minutes depending on template size and host performance.
    - Modifying certain properties (e.g., CPU count, memory) may require the VM to be powered off.
    - This module waits for asynchronous SCVMM jobs to complete before returning.
    - Check mode is supported for all operations.
    - Diff mode shows before/after VM state including all managed properties.
  extends_documentation_fragment:
    - ansible.builtin.action_common_attributes
  attributes:
    check_mode:
      support: full
    diff_mode:
      support: full
    platform:
      platforms:
        - windows
  seealso:
    - module: microsoft.scvmm.scvmm_vm_info
      description: Gather information about SCVMM virtual machines
    - module: microsoft.scvmm.scvmm_vm_state
      description: Manage SCVMM virtual machine power state
    - module: microsoft.scvmm.scvmm_vm_checkpoint
      description: Manage SCVMM virtual machine checkpoints
  author:
    - Generated by Jarvis Ansible Collection Swarm

EXAMPLES: |
  - name: Create VM from template with automatic host placement
    microsoft.scvmm.scvmm_vm:
      name: WebServer01
      vmm_server: scvmm.contoso.com
      template: WindowsServer2019Template
      cpu_count: 4
      memory_mb: 8192
      description: Production web server
      state: present

  - name: Create VM in cloud with dynamic memory
    microsoft.scvmm.scvmm_vm:
      name: AppServer01
      vmm_server: scvmm.contoso.com
      cloud: ProductionCloud
      template: WindowsServer2022Template
      cpu_count: 2
      memory_mb: 4096
      dynamic_memory_enabled: true
      dynamic_memory_min_mb: 2048
      dynamic_memory_max_mb: 8192
      state: present

  - name: Create VM on specific host with guest customization
    microsoft.scvmm.scvmm_vm:
      name: DomainController01
      vmm_server: scvmm.contoso.com
      template: WindowsServer2019Template
      vm_host: hyperv01.contoso.com
      cpu_count: 2
      memory_mb: 4096
      computer_name: DC01
      domain: contoso.com
      product_key: XXXXX-XXXXX-XXXXX-XXXXX-XXXXX
      time_zone: 35
      state: present

  - name: Create Generation 2 VM with secure boot and nested virtualization
    microsoft.scvmm.scvmm_vm:
      name: NestedHost01
      vmm_server: scvmm.contoso.com
      template: WindowsServer2022Gen2Template
      generation: 2
      cpu_count: 8
      memory_mb: 16384
      enable_nested_virtualization: true
      secure_boot_enabled: true
      state: present

  - name: Create highly available VM with auto-start configuration
    microsoft.scvmm.scvmm_vm:
      name: ClusteredVM01
      vmm_server: scvmm.contoso.com
      template: WindowsServer2019Template
      host_group: ProductionCluster
      highly_available: true
      start_action: AlwaysAutoTurnOnVM
      stop_action: ShutdownGuestOS
      delay_start_seconds: 30
      state: present

  - name: Update existing VM configuration
    microsoft.scvmm.scvmm_vm:
      name: WebServer01
      vmm_server: scvmm.contoso.com
      cpu_count: 8
      memory_mb: 16384
      description: Updated production web server
      checkpoint_type: Production
      state: present

  - name: Create VM and start it immediately
    microsoft.scvmm.scvmm_vm:
      name: TestVM01
      vmm_server: scvmm.contoso.com
      template: WindowsServer2019Template
      cpu_count: 2
      memory_mb: 4096
      start_vm: true
      state: present

  - name: Remove a virtual machine
    microsoft.scvmm.scvmm_vm:
      name: OldVM01
      vmm_server: scvmm.contoso.com
      state: absent

  - name: Create VM with custom storage path
    microsoft.scvmm.scvmm_vm:
      name: DataVM01
      vmm_server: scvmm.contoso.com
      template: WindowsServer2019Template
      vm_host: hyperv01.contoso.com
      path: D:\VirtualMachines\DataVMs
      cpu_count: 4
      memory_mb: 8192
      state: present

RETURN:
  msg:
    description: Human-readable message describing the operation result.
    returned: always
    type: str
    sample: "VM 'WebServer01' created successfully"
  changed:
    description: Whether the VM state was changed.
    returned: always
    type: bool
    sample: true
  vm:
    description: Information about the virtual machine after the operation.
    returned: success and state=present (not in check mode for absent)
    type: dict
    contains:
      name:
        description: Name of the virtual machine.
        type: str
        sample: "WebServer01"
      status:
        description: Current power state of the VM.
        type: str
        sample: "PoweredOff"
      cpu_count:
        description: Number of virtual CPUs assigned to the VM.
        type: int
        sample: 4
      memory_mb:
        description: Amount of RAM in megabytes assigned to the VM.
        type: int
        sample: 8192
      dynamic_memory_enabled:
        description: Whether dynamic memory is enabled.
        type: bool
        sample: true
      dynamic_memory_min_mb:
        description: Minimum dynamic memory in megabytes.
        type: int
        sample: 2048
      dynamic_memory_max_mb:
        description: Maximum dynamic memory in megabytes.
        type: int
        sample: 16384
      description:
        description: Description of the VM.
        type: str
        sample: "Production web server"
      start_action:
        description: Action when host starts.
        type: str
        sample: "AlwaysAutoTurnOnVM"
      stop_action:
        description: Action when host stops.
        type: str
        sample: "ShutdownGuestOS"
      delay_start_seconds:
        description: Startup delay in seconds.
        type: int
        sample: 30
      checkpoint_type:
        description: Type of checkpoints configured.
        type: str
        sample: "Production"
      vm_host:
        description: Hostname of the Hyper-V host running the VM.
        type: str
        sample: "hyperv01.contoso.com"
      cloud:
        description: Name of the cloud the VM belongs to.
        type: str
        sample: "ProductionCloud"
      generation:
        description: VM generation (1 or 2).
        type: int
        sample: 2
  differences:
    description: List of properties that were changed during update operations.
    returned: when VM was updated
    type: list
    elements: dict
    contains:
      property:
        description: Name of the property that changed.
        type: str
        sample: "CPUCount"
      current:
        description: Current value before update.
        type: raw
        sample: 2
      desired:
        description: Desired value after update.
        type: raw
        sample: 4
    sample:
      - property: "CPUCount"
        current: 2
        desired: 4
      - property: "Memory"
        current: 4096
        desired: 8192
