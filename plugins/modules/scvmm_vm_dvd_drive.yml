---
DOCUMENTATION:
  module: scvmm_vm_dvd_drive
  short_description: Manage SCVMM virtual machine DVD drive attachments
  version_added: "1.0.0"
  description:
    - Manage DVD drives for virtual machines in System Center Virtual Machine Manager (SCVMM).
    - Create, attach, detach, or remove DVD drives from VMs.
    - Attach ISO images from SCVMM library shares to DVD drives.
    - Eject ISO images from DVD drives by omitting I(iso_path).
    - Supports idempotent operations with check mode and diff mode.
  options:
    vm_name:
      description:
        - Name of the virtual machine to manage DVD drives for.
      type: str
      required: true
    vmm_server:
      description:
        - Hostname or FQDN of the SCVMM server.
        - If not specified, connects to the default SCVMM server.
      type: str
      required: false
    bus:
      description:
        - IDE bus number for the DVD drive.
        - Valid values are typically 0 or 1 for IDE controllers.
        - Default is 1 (secondary IDE channel).
      type: int
      required: false
      default: 1
    lun:
      description:
        - Logical Unit Number (LUN) on the IDE bus.
        - Valid values are typically 0 or 1.
        - Default is 0 (master position on the bus).
      type: int
      required: false
      default: 0
    iso_path:
      description:
        - Name or share path of the ISO image from the SCVMM library to attach.
        - Can be the ISO name (e.g., C(Windows2022.iso)) or the full share path.
        - If omitted when I(state=present), the DVD drive will have no media attached (ejected).
        - To eject an ISO, run the module with I(state=present) and omit this parameter.
      type: str
      required: false
    state:
      description:
        - Desired state of the DVD drive.
        - C(present) - Create the DVD drive if it doesn't exist, or update ISO attachment if it does.
        - C(absent) - Remove the DVD drive from the VM.
      type: str
      required: false
      default: present
      choices:
        - present
        - absent
  notes:
    - Requires the VirtualMachineManager PowerShell module installed on the target Windows host.
    - Requires SCVMM 2019 or later.
    - This module is idempotent - running it multiple times with the same parameters produces the same result.
    - ISO images must already exist in the SCVMM library before they can be attached.
    - DVD drives use IDE controllers - ensure the VM has IDE controllers available.
    - Generation 2 VMs may have different controller requirements.
    - The bus and LUN combination must be unique within the VM.
    - To eject an ISO without removing the drive, use I(state=present) without I(iso_path).
    - Removing a DVD drive that has an ISO attached will also detach the ISO.
  requirements:
    - Windows Server 2016 or later
    - PowerShell 5.1 or later
    - VirtualMachineManager PowerShell module
    - SCVMM 2019 or later
  author:
    - Generated by Jarvis Universal Ansible Collection Swarm

EXAMPLES: |
  - name: Create a DVD drive and attach an ISO
    microsoft.scvmm.scvmm_vm_dvd_drive:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      bus: 1
      lun: 0
      iso_path: Windows2022.iso
      state: present

  - name: Create a DVD drive without attaching an ISO
    microsoft.scvmm.scvmm_vm_dvd_drive:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      bus: 1
      lun: 0
      state: present

  - name: Attach a different ISO to an existing DVD drive
    microsoft.scvmm.scvmm_vm_dvd_drive:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      bus: 1
      lun: 0
      iso_path: Ubuntu2204.iso
      state: present

  - name: Eject an ISO from a DVD drive (drive remains)
    microsoft.scvmm.scvmm_vm_dvd_drive:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      bus: 1
      lun: 0
      state: present

  - name: Remove a DVD drive from a VM
    microsoft.scvmm.scvmm_vm_dvd_drive:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      bus: 1
      lun: 0
      state: absent

  - name: Create DVD drive on secondary IDE channel, slave position
    microsoft.scvmm.scvmm_vm_dvd_drive:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      bus: 1
      lun: 1
      iso_path: DriversPack.iso
      state: present

  - name: Use ISO share path instead of name
    microsoft.scvmm.scvmm_vm_dvd_drive:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      bus: 1
      lun: 0
      iso_path: \\library.domain.com\ISOs\Windows2022.iso
      state: present

  - name: Create DVD drives for multiple VMs
    microsoft.scvmm.scvmm_vm_dvd_drive:
      vm_name: "{{ item }}"
      vmm_server: scvmm01.domain.com
      bus: 1
      lun: 0
      iso_path: Windows2022.iso
      state: present
    loop:
      - TestVM01
      - TestVM02
      - TestVM03

  - name: Manage DVD drive in check mode
    microsoft.scvmm.scvmm_vm_dvd_drive:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      bus: 1
      lun: 0
      iso_path: Windows2022.iso
      state: present
    check_mode: true

RETURN: |
  msg:
    description: Human-readable message describing the operation performed.
    returned: always
    type: str
    sample: "DVD drive on bus 1, LUN 0 created successfully"

  dvd_drive:
    description: Detailed information about the DVD drive.
    returned: when DVD drive exists and not in check mode
    type: dict
    contains:
      bus:
        description: IDE bus number.
        type: int
        sample: 1
      lun:
        description: Logical Unit Number on the bus.
        type: int
        sample: 0
      iso_path:
        description: Name of the attached ISO image, or null if no media attached.
        type: str
        sample: "Windows2022.iso"
      vm_name:
        description: Name of the VM the DVD drive belongs to.
        type: str
        sample: "TestVM01"
      name:
        description: SCVMM internal name of the DVD drive.
        type: str
        sample: "DVD Drive on IDE 1:0"

  changed:
    description: Whether the DVD drive state was changed.
    returned: always
    type: bool
    sample: true

  diff:
    description: Difference between before and after states (when diff mode is enabled).
    returned: when diff mode is enabled
    type: dict
    contains:
      before:
        description: State before the operation.
        type: dict
      after:
        description: State after the operation.
        type: dict
