DOCUMENTATION:
  module: scvmm_vm_clone
  short_description: Clone virtual machines in SCVMM
  description:
    - Create full clones of existing virtual machines in System Center Virtual Machine Manager (SCVMM).
    - Clones are complete, independent copies with new VM identities.
    - Supports custom placement on clouds, hosts, or host groups.
    - Allows hardware customization (CPU, memory, network) after cloning.
    - Provides idempotent clone management with automatic duplicate detection.
  version_added: "1.0.0"
  requirements:
    - PowerShell module VirtualMachineManager
    - SCVMM 2019 or later
    - Source VM must exist and be accessible
  options:
    source_vm:
      description:
        - Name of the existing virtual machine to clone.
        - The source VM must exist in the SCVMM environment.
        - Source VM can be in any power state (running, stopped, saved).
      type: str
      required: true
    clone_name:
      description:
        - Name for the cloned virtual machine.
        - Must be unique within the SCVMM environment.
        - This becomes the new VM's display name.
      type: str
      required: true
    vmm_server:
      description:
        - FQDN or hostname of the SCVMM server to connect to.
        - If not specified, connects to the default SCVMM server.
      type: str
    state:
      description:
        - Desired state of the clone.
        - V(present) ensures the clone exists with the specified name.
        - V(absent) ensures the clone is removed.
      type: str
      default: present
      choices:
        - present
        - absent
    vm_host:
      description:
        - Hostname or FQDN of the Hyper-V host where the clone should be placed.
        - If not specified, SCVMM will use automatic placement based on host ratings.
        - Mutually exclusive with O(cloud).
      type: str
    cloud:
      description:
        - Name of the SCVMM cloud to place the clone in.
        - Provides resource isolation and capacity management.
        - Mutually exclusive with O(vm_host).
      type: str
    host_group:
      description:
        - Name of the host group to use for automatic clone placement.
        - SCVMM will select the best host within this group based on ratings.
        - Useful for balancing workloads across multiple hosts.
      type: str
    path:
      description:
        - Storage path where the cloned VM files will be placed.
        - Should be a path accessible from the target Hyper-V host.
        - If not specified, SCVMM uses default storage location for the target host.
        - 'Example: C(\\fileserver\vmstore\clones) or C(C:\ClusterStorage\Volume1)'
      type: str
    vm_network:
      description:
        - Name of the VM network to connect the clone to.
        - If specified, updates the clone's first network adapter after cloning.
        - Useful for placing clones in different network segments than the source.
      type: str
    description:
      description:
        - Description for the cloned VM.
        - Helps identify the purpose or owner of the clone.
        - If not specified, clone inherits description from source VM.
      type: str
    start_vm:
      description:
        - Start the cloned VM immediately after creation.
        - If V(false), the clone remains in powered-off state.
        - Useful for automatic provisioning workflows.
      type: bool
      default: false
    cpu_count:
      description:
        - Number of virtual CPUs to assign to the clone.
        - Overrides the CPU count from the source VM.
        - Applied after cloning completes.
      type: int
    memory_mb:
      description:
        - Amount of RAM in megabytes to assign to the clone.
        - Overrides the memory configuration from the source VM.
        - Applied after cloning completes.
      type: int
  author:
    - Generated by Jarvis Universal Ansible Collection Swarm
  notes:
    - Cloning creates a full, independent copy of the source VM.
    - The clone receives a new VM ID and MAC addresses.
    - Cloning may take several minutes depending on VM size and storage performance.
    - Check mode is supported and reports whether a clone would be created.
    - Diff mode shows the clone's properties before and after the operation.
    - The module is idempotent - re-running with the same O(clone_name) will not create duplicates.

EXAMPLES: |
  - name: Clone a VM to the same host
    microsoft.scvmm.scvmm_vm_clone:
      source_vm: WebServer01
      clone_name: WebServer01-Clone
      vmm_server: scvmm.domain.local
      state: present

  - name: Clone VM to a specific cloud with custom hardware
    microsoft.scvmm.scvmm_vm_clone:
      source_vm: TemplateVM
      clone_name: Production-WebServer-03
      cloud: Production-Cloud
      cpu_count: 4
      memory_mb: 8192
      description: Production web server (cloned from TemplateVM)
      state: present

  - name: Clone VM to specific host and start immediately
    microsoft.scvmm.scvmm_vm_clone:
      source_vm: GoldenImage-Win2022
      clone_name: AppServer-05
      vm_host: hyperv03.domain.local
      path: C:\ClusterStorage\Volume2\VMs
      start_vm: true
      state: present

  - name: Clone VM with network reconfiguration
    microsoft.scvmm.scvmm_vm_clone:
      source_vm: Base-Ubuntu-Server
      clone_name: Test-Ubuntu-01
      cloud: Test-Cloud
      vm_network: Test-Network-VLAN20
      cpu_count: 2
      memory_mb: 4096
      state: present

  - name: Clone to host group with custom storage path
    microsoft.scvmm.scvmm_vm_clone:
      source_vm: SQL-Server-Template
      clone_name: SQL-Prod-02
      host_group: Database-Servers
      path: \\fileserver\vm-storage\sql-servers
      description: SQL Server production instance
      state: present

  - name: Remove a cloned VM
    microsoft.scvmm.scvmm_vm_clone:
      source_vm: TemplateVM
      clone_name: Temporary-Clone-01
      state: absent

  - name: Clone for testing (check mode)
    microsoft.scvmm.scvmm_vm_clone:
      source_vm: Production-App
      clone_name: Test-Clone
      cloud: Test-Cloud
      state: present
    check_mode: true

RETURN:
  clone:
    description: Properties of the cloned virtual machine.
    returned: when O(state=present) and clone exists
    type: dict
    contains:
      name:
        description: Name of the cloned VM.
        type: str
        sample: WebServer01-Clone
      status:
        description: Current power state of the clone.
        type: str
        sample: PoweredOff
      cpu_count:
        description: Number of virtual CPUs assigned to the clone.
        type: int
        sample: 4
      memory_mb:
        description: Amount of RAM in megabytes assigned to the clone.
        type: int
        sample: 8192
      description:
        description: Description of the cloned VM.
        type: str
        sample: Production web server (cloned from TemplateVM)
      vm_host:
        description: Hostname of the Hyper-V host running the clone.
        type: str
        sample: hyperv03.domain.local
      cloud:
        description: Name of the cloud containing the clone.
        type: str
        sample: Production-Cloud
      generation:
        description: VM generation (1 or 2).
        type: int
        sample: 2
      vm_id:
        description: Unique identifier of the cloned VM.
        type: str
        sample: 12345678-1234-1234-1234-123456789abc
  msg:
    description: Human-readable message describing the operation result.
    returned: always
    type: str
    sample: VM 'WebServer01-Clone' cloned successfully from 'WebServer01'
  changed:
    description: Whether the module made changes.
    returned: always
    type: bool
    sample: true
