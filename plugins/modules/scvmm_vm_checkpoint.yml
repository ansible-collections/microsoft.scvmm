---
DOCUMENTATION:
  module: scvmm_vm_checkpoint
  short_description: Manage SCVMM virtual machine checkpoints (snapshots)
  version_added: "1.0.0"
  description:
    - Manage checkpoints (snapshots) for virtual machines in System Center Virtual Machine Manager (SCVMM).
    - Create, delete, or restore VM checkpoints.
    - Checkpoints capture the state of a VM at a specific point in time.
    - Supports idempotent operations with check mode and diff mode.
  options:
    vm_name:
      description:
        - Name of the virtual machine to manage checkpoints for.
      type: str
      required: true
    vmm_server:
      description:
        - Hostname or FQDN of the SCVMM server.
      type: str
      required: true
    checkpoint_name:
      description:
        - Name of the checkpoint to create, delete, or restore.
        - Must be unique for the VM.
      type: str
      required: true
    description:
      description:
        - Description for the checkpoint.
        - Only used when creating a new checkpoint (I(state=present)).
        - SCVMM does not support modifying checkpoint descriptions after creation.
      type: str
      required: false
    state:
      description:
        - Desired state of the checkpoint.
        - C(present) - Create the checkpoint if it doesn't exist.
        - C(absent) - Remove the checkpoint if it exists.
        - C(restored) - Restore the VM to the state captured in the checkpoint.
      type: str
      required: true
      choices:
        - present
        - absent
        - restored
  notes:
    - Requires the VirtualMachineManager PowerShell module installed on the target Windows host.
    - Requires SCVMM 2019 or later.
    - This module is idempotent for I(state=present) and I(state=absent).
    - Restoring a checkpoint (I(state=restored)) always reports changed=true.
    - Restoring a checkpoint will revert the VM to the state when the checkpoint was created.
    - All changes made after the checkpoint was created will be lost when restoring.
    - SCVMM does not support modifying checkpoint properties after creation.
    - Checkpoints can impact VM performance and storage usage.
  requirements:
    - Windows Server 2016 or later
    - PowerShell 5.1 or later
    - VirtualMachineManager PowerShell module
    - SCVMM 2019 or later
  author:
    - Generated by Jarvis Universal Ansible Collection Swarm

EXAMPLES: |
  - name: Create a checkpoint for a VM
    microsoft.scvmm.scvmm_vm_checkpoint:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      checkpoint_name: BeforeUpdate
      description: "Checkpoint before applying Windows updates"
      state: present

  - name: Create a checkpoint without description
    microsoft.scvmm.scvmm_vm_checkpoint:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      checkpoint_name: BeforePatching
      state: present

  - name: Remove a checkpoint
    microsoft.scvmm.scvmm_vm_checkpoint:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      checkpoint_name: BeforeUpdate
      state: absent

  - name: Restore a VM to a checkpoint
    microsoft.scvmm.scvmm_vm_checkpoint:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      checkpoint_name: BeforeUpdate
      state: restored

  - name: Create checkpoint in check mode
    microsoft.scvmm.scvmm_vm_checkpoint:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      checkpoint_name: TestCheckpoint
      description: "Test checkpoint"
      state: present
    check_mode: true

  - name: Create multiple checkpoints for different stages
    microsoft.scvmm.scvmm_vm_checkpoint:
      vm_name: "{{ item.vm }}"
      vmm_server: scvmm01.domain.com
      checkpoint_name: "{{ item.checkpoint }}"
      description: "{{ item.desc }}"
      state: present
    loop:
      - { vm: "TestVM01", checkpoint: "PreDeployment", desc: "Before deployment" }
      - { vm: "TestVM01", checkpoint: "PostDeployment", desc: "After deployment" }
      - { vm: "TestVM02", checkpoint: "PreDeployment", desc: "Before deployment" }

RETURN: |
  msg:
    description: Human-readable message describing the operation performed.
    returned: always
    type: str
    sample: "Checkpoint 'BeforeUpdate' created successfully"

  vm_name:
    description: Name of the virtual machine.
    returned: always
    type: str
    sample: "TestVM01"

  checkpoint_name:
    description: Name of the checkpoint.
    returned: always
    type: str
    sample: "BeforeUpdate"

  checkpoint:
    description: Detailed information about the checkpoint.
    returned: when checkpoint exists and not in check mode
    type: dict
    contains:
      name:
        description: Name of the checkpoint.
        type: str
        sample: "BeforeUpdate"
      description:
        description: Description of the checkpoint.
        type: str
        sample: "Checkpoint before applying Windows updates"
      vm_name:
        description: Name of the VM the checkpoint belongs to.
        type: str
        sample: "TestVM01"
      checkpoint_id:
        description: Unique identifier of the checkpoint.
        type: str
        sample: "12345678-1234-1234-1234-123456789abc"
      added_time:
        description: Timestamp when the checkpoint was created.
        type: str
        sample: "2026-06-15T14:30:00"
      is_most_recent:
        description: Whether this is the most recent checkpoint for the VM.
        type: bool
        sample: true

  changed:
    description: Whether the checkpoint state was changed.
    returned: always
    type: bool
    sample: true

  diff:
    description: Difference between before and after states (when diff mode is enabled).
    returned: when diff mode is enabled
    type: dict
    contains:
      before:
        description: State before the operation.
        type: dict
      after:
        description: State after the operation.
        type: dict
