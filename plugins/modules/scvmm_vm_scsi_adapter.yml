---
DOCUMENTATION:
  module: scvmm_vm_scsi_adapter
  short_description: Manage SCVMM virtual machine SCSI adapters
  version_added: "1.0.0"
  description:
    - Manage SCSI adapters for virtual machines in System Center Virtual Machine Manager (SCVMM).
    - Create or remove SCSI adapters required for attaching virtual hard disks.
    - SCSI adapters are virtual hardware components that enable VMs to connect to virtual disks.
    - Supports idempotent operations with check mode and diff mode.
  options:
    vm_name:
      description:
        - Name of the virtual machine to manage SCSI adapters for.
      type: str
      required: true
    vmm_server:
      description:
        - Hostname or FQDN of the SCVMM server.
      type: str
      required: true
    adapter_id:
      description:
        - Specific SCSI bus ID (0-3) for the adapter.
        - When I(state=present) and adapter_id is specified, creates or checks the adapter at this specific bus ID.
        - When I(state=present) and adapter_id is not specified, creates a new adapter with the next available bus ID.
        - When I(state=absent) and adapter_id is specified, removes only the adapter at this bus ID.
        - When I(state=absent) and adapter_id is not specified, removes all SCSI adapters from the VM.
      type: int
      required: false
    scsi_controller_type:
      description:
        - Type of SCSI controller to use for the adapter.
        - Only used when creating a new adapter (I(state=present)).
        - SCVMM does not support modifying the controller type after creation.
        - C(DefaultTypeNoType) uses the default controller type for the VM platform.
      type: str
      required: false
      default: DefaultTypeNoType
      choices:
        - DefaultTypeNoType
        - LsiLogic
        - LsiLogicSAS
        - BusLogic
        - ParaVirtualSCSI
    state:
      description:
        - Desired state of the SCSI adapter.
        - C(present) - Ensure the SCSI adapter exists.
        - C(absent) - Ensure the SCSI adapter is removed.
      type: str
      required: true
      choices:
        - present
        - absent
  notes:
    - Requires the VirtualMachineManager PowerShell module installed on the target Windows host.
    - Requires SCVMM 2019 or later.
    - This module is idempotent for both I(state=present) and I(state=absent).
    - SCSI adapters are required before virtual hard disks can be attached to a VM.
    - Each VM can have up to 4 SCSI adapters (Bus IDs 0-3).
    - SCVMM does not support modifying the controller type after the adapter is created.
    - Removing a SCSI adapter will also remove any virtual hard disks attached to it.
    - The controller type must be compatible with the VM's guest operating system.
  requirements:
    - Windows Server 2016 or later
    - PowerShell 5.1 or later
    - VirtualMachineManager PowerShell module
    - SCVMM 2019 or later
  author:
    - Generated by Jarvis Universal Ansible Collection Swarm

EXAMPLES: |
  - name: Add a SCSI adapter to a VM (auto-assign bus ID)
    microsoft.scvmm.scvmm_vm_scsi_adapter:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      state: present

  - name: Add a SCSI adapter at specific bus ID
    microsoft.scvmm.scvmm_vm_scsi_adapter:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      adapter_id: 0
      state: present

  - name: Add a SCSI adapter with specific controller type
    microsoft.scvmm.scvmm_vm_scsi_adapter:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      adapter_id: 1
      scsi_controller_type: LsiLogicSAS
      state: present

  - name: Add multiple SCSI adapters
    microsoft.scvmm.scvmm_vm_scsi_adapter:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      adapter_id: "{{ item }}"
      state: present
    loop:
      - 0
      - 1
      - 2

  - name: Remove a specific SCSI adapter
    microsoft.scvmm.scvmm_vm_scsi_adapter:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      adapter_id: 2
      state: absent

  - name: Remove all SCSI adapters from a VM
    microsoft.scvmm.scvmm_vm_scsi_adapter:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      state: absent

  - name: Ensure SCSI adapter exists (idempotent)
    microsoft.scvmm.scvmm_vm_scsi_adapter:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      adapter_id: 0
      scsi_controller_type: DefaultTypeNoType
      state: present

  - name: Add SCSI adapter in check mode
    microsoft.scvmm.scvmm_vm_scsi_adapter:
      vm_name: TestVM01
      vmm_server: scvmm01.domain.com
      adapter_id: 1
      state: present
    check_mode: true

  - name: Configure SCSI adapters for multiple VMs
    microsoft.scvmm.scvmm_vm_scsi_adapter:
      vm_name: "{{ item.vm }}"
      vmm_server: scvmm01.domain.com
      adapter_id: "{{ item.bus }}"
      scsi_controller_type: "{{ item.type }}"
      state: present
    loop:
      - { vm: "TestVM01", bus: 0, type: "LsiLogicSAS" }
      - { vm: "TestVM01", bus: 1, type: "LsiLogicSAS" }
      - { vm: "TestVM02", bus: 0, type: "DefaultTypeNoType" }

RETURN: |
  msg:
    description: Human-readable message describing the operation performed.
    returned: always
    type: str
    sample: "SCSI adapter with ID '0' created successfully"

  vm_name:
    description: Name of the virtual machine.
    returned: always
    type: str
    sample: "TestVM01"

  adapter:
    description: Detailed information about the SCSI adapter.
    returned: when adapter exists and not in check mode
    type: dict
    contains:
      adapter_id:
        description: Unique identifier of the SCSI adapter.
        type: str
        sample: "12345678-1234-1234-1234-123456789abc"
      scsi_controller_type:
        description: Type of SCSI controller.
        type: str
        sample: "LsiLogicSAS"
      scsi_bus:
        description: SCSI bus ID (0-3).
        type: int
        sample: 0
      scsi_lun:
        description: SCSI logical unit number.
        type: int
        sample: 0
      name:
        description: Name of the SCSI adapter.
        type: str
        sample: "SCSI Adapter 0"

  changed:
    description: Whether the SCSI adapter state was changed.
    returned: always
    type: bool
    sample: true

  diff:
    description: Difference between before and after states (when diff mode is enabled).
    returned: when diff mode is enabled
    type: dict
    contains:
      before:
        description: State before the operation.
        type: dict
      after:
        description: State after the operation.
        type: dict
